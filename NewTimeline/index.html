<html>
	<head>
		<head>
	        <meta charset="utf-8">
	        <title>Timeline</title>
	        <link href="styles/styles.css" rel="stylesheet" type="text/css"/>
	    </head>
	</head>
	<body>
		<div id=header>
			<h1>Hoersverse Timelines</h1>
			<div class="toggle-wrap">
			    <span class="label active" id="label-left">Stardust</span>
			    <label class="switch">
			    	<input type="checkbox" id="toggle" />
			    	<div class="track"></div>
			    	<div class="thumb"></div>
			    </label>
			    <span class="label" id="label-right">Sunjackers</span>
			</div>
			<div class="slider-wrap">
				<span>Scale:</span>
				<input type="range" id="scale-slider" min="10" max="50" value="25" step="1">
				<span id="scale-label">25</span>
			</div>
		</div>
		<div id="timeline">
			<div id="axis"></div>
		</div>
	</body>
	<script src="scripts/flow.js"></script>
	<script src="scripts/script.js"></script>
</html>
